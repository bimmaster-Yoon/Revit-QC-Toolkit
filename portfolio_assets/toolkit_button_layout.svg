    </g>
    <g transform="translate(972 145)">
      <rect width="270" height="225" rx="12" fill="#ffffff" stroke="#dfe4ea" stroke-width="2"/>
      <rect width="270" height="7" rx="3.5" fill="#f47c20"/>
