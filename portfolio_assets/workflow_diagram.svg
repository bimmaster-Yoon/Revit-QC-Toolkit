<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="430" viewBox="0 0 1600 430" role="img" aria-labelledby="title desc">
  <title id="title">Revit QC Report Automation Workflow</title>
  <desc id="desc">Codex Prompt에서 pyRevit Script, Revit Read-only Check, QC Report, Full CSV와 Summary CSV로 이어지는 업무 흐름</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0,0 L12,6 L0,12 Z" fill="#f47c20"/>
    </marker>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#14253d" flood-opacity="0.10"/>
    </filter>
  </defs>
  <rect width="1600" height="430" fill="#ffffff"/>
  <text x="48" y="62" fill="#14253d" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="30" font-weight="700" letter-spacing="1.5">READ-ONLY QC AUTOMATION WORKFLOW</text>
  <text x="48" y="94" fill="#697386" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="16">From structured prompt to traceable review data — without modifying the Revit model</text>

  <g font-family="Arial, 'Noto Sans KR', sans-serif">
    <g filter="url(#shadow)">
      <rect x="48" y="145" width="250" height="180" rx="10" fill="#ffffff" stroke="#14253d" stroke-width="2"/>
      <rect x="48" y="145" width="250" height="7" rx="3.5" fill="#f47c20"/>
      <circle cx="82" cy="185" r="17" fill="#f47c20"/>
      <text x="82" y="191" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">01</text>
      <text x="78" y="236" fill="#14253d" font-size="22" font-weight="700">Codex Prompt</text>
      <text x="78" y="270" fill="#697386" font-size="15">QC rules · output structure</text>
      <text x="78" y="294" fill="#697386" font-size="15">iteration requirements</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="360" y="145" width="250" height="180" rx="10" fill="#ffffff" stroke="#14253d" stroke-width="2"/>
      <rect x="360" y="145" width="250" height="7" rx="3.5" fill="#f47c20"/>
      <circle cx="394" cy="185" r="17" fill="#f47c20"/>
      <text x="394" y="191" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">02</text>
      <text x="390" y="236" fill="#14253d" font-size="22" font-weight="700">pyRevit Script</text>
      <text x="390" y="270" fill="#697386" font-size="15">Sheet · View · Parameter</text>
      <text x="390" y="294" fill="#697386" font-size="15">rule-based collection</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="672" y="145" width="250" height="180" rx="10" fill="#ffffff" stroke="#14253d" stroke-width="2"/>
      <rect x="672" y="145" width="250" height="7" rx="3.5" fill="#f47c20"/>
      <circle cx="706" cy="185" r="17" fill="#f47c20"/>
      <text x="706" y="191" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">03</text>
      <text x="702" y="226" fill="#14253d" font-size="20" font-weight="700">Revit Read-only</text>
      <text x="702" y="252" fill="#14253d" font-size="20" font-weight="700">Check</text>
      <text x="702" y="286" fill="#697386" font-size="15">No Transaction</text>
      <text x="702" y="309" fill="#697386" font-size="15">No model modification</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="984" y="145" width="250" height="180" rx="10" fill="#ffffff" stroke="#14253d" stroke-width="2"/>
      <rect x="984" y="145" width="250" height="7" rx="3.5" fill="#f47c20"/>
      <circle cx="1018" cy="185" r="17" fill="#f47c20"/>
      <text x="1018" y="191" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">04</text>
      <text x="1014" y="236" fill="#14253d" font-size="22" font-weight="700">QC Report</text>
      <text x="1014" y="270" fill="#697386" font-size="15">Compact Summary</text>
      <text x="1014" y="294" fill="#697386" font-size="15">Review Group Summary</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1296" y="145" width="256" height="180" rx="10" fill="#ffffff" stroke="#14253d" stroke-width="2"/>
      <rect x="1296" y="145" width="256" height="7" rx="3.5" fill="#f47c20"/>
      <circle cx="1330" cy="185" r="17" fill="#f47c20"/>
      <text x="1330" y="191" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="700">05</text>
      <text x="1326" y="229" fill="#14253d" font-size="20" font-weight="700">Full CSV</text>
      <text x="1326" y="255" fill="#14253d" font-size="20" font-weight="700">Summary CSV</text>
      <text x="1326" y="290" fill="#697386" font-size="15">Detailed + grouped data</text>
      <text x="1326" y="313" fill="#697386" font-size="15">for follow-up review</text>
    </g>
  </g>

  <g stroke="#f47c20" stroke-width="4" fill="none" marker-end="url(#arrow)">
    <path d="M306 235 H346"/>
    <path d="M618 235 H658"/>
    <path d="M930 235 H970"/>
    <path d="M1242 235 H1282"/>
  </g>
  <line x1="48" y1="378" x2="1552" y2="378" stroke="#dfe4ea" stroke-width="1"/>
  <text x="48" y="405" fill="#14253d" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="14" font-weight="700">MODEL-SAFE PROCESS</text>
  <text x="220" y="405" fill="#697386" font-family="Arial, 'Noto Sans KR', sans-serif" font-size="14">Review automation aligned with Revit documentation workflow</text>
</svg>
